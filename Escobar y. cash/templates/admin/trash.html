{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
    <h1>Papelera</h1>
</div>
<div class="card">
    {% if items %}
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Tipo</th>
                    <th>Eliminado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.nombre }}</td>
                    <td><span class="badge badge-info">{{ item.tipo }}</span></td>
                    <td>{{ item.deleted_at|date:"d/m/Y H:i" }}</td>
                    <td class="actions-cell">
                        <a href="{% url 'admin_trash_restore' item.modelo item.id %}" class="btn-icon" title="Restaurar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                        </a>
                        <a href="{% url 'admin_trash_delete' item.modelo item.id %}" class="btn-icon btn-danger" title="Eliminar permanentemente" onclick="return confirm('¿Eliminar permanentemente? Esta acción no se puede deshacer.')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="empty-state-full">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        <p>La papelera está vacía</p>
    </div>
    {% endif %}
</div>
{% endblock %}

<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iniciar Sesión - {{ site_config.nombre_tienda }}</title>
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                {% if site_config.logo_url %}
                    <img src="{{ site_config.logo_url }}" alt="{{ site_config.nombre_tienda }}" class="login-logo">
                {% endif %}
                <h1 class="login-title">{{ site_config.nombre_tienda }}</h1>
                <p class="login-subtitle">Panel Administrativo</p>
            </div>
            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="message message-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            <form method="post" class="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingresa tu contraseña" required>
                </div>
                <button type="submit" class="btn-primary btn-full">Iniciar Sesión</button>
            </form>
            <div class="login-footer">
                <a href="{% url 'home' %}" class="login-link">← Volver a la tienda</a>
            </div>
        </div>
    </div>
</body>
</html>

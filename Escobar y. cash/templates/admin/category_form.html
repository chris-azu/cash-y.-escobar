{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
    <h1>{% if category %}Editar Categoría{% else %}Nueva Categoría{% endif %}</h1>
    <a href="{% url 'admin_category_list' %}" class="btn-secondary">← Volver</a>
</div>
<div class="card">
    <form method="post" class="form">
        {% csrf_token %}
        <div class="form-group">
            <label for="nombre">Nombre de la categoría</label>
            <input type="text" id="nombre" name="nombre" value="{{ category.nombre|default:'' }}" placeholder="Ej: Refrigeración" required autofocus>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">
                {% if category %}Guardar Cambios{% else %}Crear Categoría{% endif %}
            </button>
            <a href="{% url 'admin_category_list' %}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
    <h1>Dashboard</h1>
</div>
<div class="dashboard-grid">
    <div class="card dashboard-card">
        <div class="card-icon blue">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        </div>
        <div class="card-content">
            <span class="card-value">{{ total_products }}</span>
            <span class="card-label">Productos</span>
        </div>
    </div>
    <div class="card dashboard-card">
        <div class="card-icon green">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="card-content">
            <span class="card-value">{{ total_categories }}</span>
            <span class="card-label">Categorías</span>
        </div>
    </div>
    <div class="card dashboard-card">
        <div class="card-icon orange">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <div class="card-content">
            <span class="card-value">{{ total_banners }}</span>
            <span class="card-label">Banners</span>
        </div>
    </div>
    <div class="card dashboard-card">
        <div class="card-icon red">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </div>
        <div class="card-content">
            <span class="card-value">{{ trashed_count }}</span>
            <span class="card-label">En Papelera</span>
        </div>
    </div>
</div>
<div class="quick-actions">
    <h2>Acciones rápidas</h2>
    <div class="actions-grid">
        <a href="{% url 'admin_product_create' %}" class="action-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nuevo Producto
        </a>
        <a href="{% url 'admin_category_create' %}" class="action-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nueva Categoría
        </a>
        <a href="{% url 'admin_banner_create' %}" class="action-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nuevo Banner
        </a>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo — ElectroHogar</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230066cc'/%3E%3Cpath d='M35 50 L50 35 L65 50 L50 65 Z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 48px 32px;
      text-align: center;
    }
    .login-card .login-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #003366);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff;
      margin: 0 auto 24px;
    }
    .login-card h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 32px;
      color: var(--text-primary);
    }
    .login-error {
      background: rgba(214, 40, 40, 0.1);
      border: 1px solid rgba(214, 40, 40, 0.3);
      color: #ef5350;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="glass-card login-card">
      <div class="login-logo">EH</div>
      <h1>Panel Administrativo</h1>
      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <input type="password" class="form-control" id="passwordInput" placeholder="Contrasena" autofocus>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
          Ingresar
        </button>
      </form>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    if (EH_DATA.getSession()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('loginError');
      errorEl.style.display = 'none';

      const submitBtn = document.querySelector('#loginForm button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Ingresando...';

      const pw = document.getElementById('passwordInput').value.trim();
      if (EH_DATA.login(pw)) {
        window.location.href = 'dashboard.html';
        return;
      }

      errorEl.textContent = 'Contrasena incorrecta.';
      errorEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Ingresar';
    });
  </script>
</body>
</html>

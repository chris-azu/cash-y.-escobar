{% extends 'admin/base.html' %}
{% load static %}
{% block title %}Iniciar Sesión - Admin{% endblock %}

{% block admin_content %}
<div class="admin-login-container">
    <div class="admin-login-card">
        <div class="admin-login-header">
            <i class="fas fa-cog"></i>
            <h1>Panel de Administración</h1>
            <p>{{ site_config.nombre_tienda }}</p>
        </div>
        <form method="POST" action="{% url 'admin_login' %}" class="admin-login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" name="username" id="username" class="form-control" placeholder="Ingresa tu usuario" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" name="password" id="password" class="form-control" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Iniciar Sesión</button>
        </form>
        <a href="{% url 'home' %}" class="admin-login-back"><i class="fas fa-arrow-left"></i> Volver a la tienda</a>
    </div>
</div>
{% endblock %}
